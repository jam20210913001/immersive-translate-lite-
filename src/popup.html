<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Immersive Translate Lite</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #0f1f3a;
        background: #edf7f8;
      }
      body {
        width: 440px;
        margin: 0;
        background: linear-gradient(180deg, #bfeff0 0, #edf7f8 100px, #f8fafc 100%);
      }
      .shell {
        padding: 12px 14px 8px;
      }
      .topbar,
      .grid,
      .bottom {
        display: grid;
        gap: 10px;
      }
      .topbar {
        grid-template-columns: 32px auto 1fr;
        align-items: center;
        margin-bottom: 12px;
      }
      .mark {
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        border-radius: 50%;
        color: #fff;
        background: #035f62;
        font-weight: 900;
      }
      .pro {
        border: 0;
        border-radius: 999px;
        padding: 7px 12px;
        color: #fff;
        background: #19113f;
        font-weight: 800;
      }
      .langline {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        font-size: 13px;
      }
      .arrow {
        color: #0aaeba;
        font-size: 18px;
      }
      .grid {
        grid-template-columns: 1fr 1fr;
        margin-bottom: 8px;
      }
      select,
      textarea,
      button {
        font: inherit;
      }
      select {
        width: 100%;
        min-height: 44px;
        border: 0;
        border-radius: 9px;
        padding: 0 36px 0 14px;
        color: #0f1f3a;
        background: #effbfc;
        font-weight: 800;
      }
      .card {
        margin-top: 8px;
        border: 1px solid #dde7ec;
        border-radius: 9px;
        padding: 12px;
        background: #fff;
        box-shadow: 0 1px 5px rgba(15, 23, 42, 0.08);
      }
      .card-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
        color: #00a7b5;
        font-weight: 900;
      }
      .config-link {
        border: 0;
        padding: 0;
        color: #64748b;
        background: transparent;
        cursor: pointer;
      }
      .translate-row {
        display: grid;
        grid-template-columns: 156px 1fr;
        gap: 8px;
      }
      .primary {
        border: 0;
        border-radius: 8px;
        min-height: 44px;
        color: #fff;
        background: #08aeb8;
        font-weight: 900;
        cursor: pointer;
      }
      .primary:hover {
        background: #0798a3;
      }
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #07b5c0;
        border-radius: 8px;
        padding: 12px;
        resize: vertical;
        outline: none;
        color: #0f172a;
        background: #fff;
      }
      #sourceText {
        min-height: 134px;
      }
      #translatedText {
        min-height: 132px;
        border-color: transparent;
        background: #f1f3f6;
      }
      .bottom {
        grid-template-columns: 1fr 1fr 1.25fr;
        align-items: center;
        margin-top: 8px;
      }
      .ghost {
        border: 0;
        padding: 8px 4px;
        color: #475569;
        background: transparent;
        cursor: pointer;
      }
      .pdf {
        border: 1px solid #e2e8f0;
        border-radius: 9px;
        padding: 10px 12px;
        color: #0f1f3a;
        background: #fff;
        font-weight: 800;
        cursor: pointer;
      }
      #status {
        min-height: 16px;
        margin-top: 6px;
        color: #0f766e;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="mark">i</div>
        <button class="pro" type="button">&#x83b7;&#x53d6;Pro</button>
        <div class="langline">
          <span id="sourceLabel">&#x82f1;&#x8bed;</span>
          <span class="arrow">-&gt;</span>
          <span id="targetLabel">&#x4e2d;&#x6587;&#xff08;&#x7b80;&#x4f53;&#xff09;</span>
        </div>
      </div>

      <div class="grid">
        <select id="provider"></select>
        <select id="mode">
          <option value="general">&#x5e38;&#x89c4;</option>
          <option value="selection">&#x5212;&#x8bcd;</option>
          <option value="hover">&#x9f20;&#x6807;&#x60ac;&#x505c;</option>
        </select>
      </div>

      <section class="card">
        <div class="card-title">
          <span>&#x7f51;&#x9875;&#x7ffb;&#x8bd1;</span>
          <button id="configure" class="config-link" type="button">&#x914d;&#x7f6e;&#x9879;⌄</button>
        </div>
        <div class="translate-row">
          <select id="pageMode">
            <option value="bilingual">&#x53cc;&#x8bed;</option>
            <option value="replace">&#x4ec5;&#x8bd1;&#x6587;</option>
          </select>
          <button id="translatePage" class="primary" type="button">&#x7ffb;&#x8bd1;</button>
        </div>
      </section>

      <section class="card">
        <div class="card-title">&#x6587;&#x672c;&#x7ffb;&#x8bd1;</div>
        <textarea id="sourceText" placeholder="&#x8f93;&#x5165;&#x9700;&#x8981;&#x7ffb;&#x8bd1;&#x7684;&#x6587;&#x5b57;..."></textarea>
        <textarea id="translatedText" readonly placeholder="&#x7ffb;&#x8bd1;&#x7ed3;&#x679c;&#x5c06;&#x663e;&#x793a;&#x5728;&#x8fd9;&#x91cc;"></textarea>
      </section>

      <div class="bottom">
        <button id="options" class="ghost" type="button">&#x2699; &#x57fa;&#x672c;&#x8bbe;&#x7f6e;</button>
        <button id="feedback" class="ghost" type="button">&#x2709; &#x53cd;&#x9988;</button>
        <button id="pdf" class="pdf" type="button">&#x25a3; PDF&#x7ffb;&#x8bd1;</button>
      </div>
      <div id="status" role="status"></div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
