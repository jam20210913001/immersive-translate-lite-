<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Immersive Translate Lite</title>
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 14px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }
      button {
        width: 100%;
        margin: 6px 0;
        border: 0;
        border-radius: 7px;
        padding: 10px 12px;
        font: inherit;
        font-weight: 800;
        color: #fff;
        background: #0f766e;
        cursor: pointer;
      }
      button.secondary {
        color: #0f172a;
        background: #e2e8f0;
      }
      #status {
        min-height: 18px;
        margin-top: 8px;
        font-size: 12px;
        color: #0f766e;
      }
    </style>
  </head>
  <body>
    <h1>Immersive Translate Lite</h1>
    <button id="toggle">翻译 / 还原当前页面</button>
    <button id="options" class="secondary">打开设置</button>
    <div id="status"></div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
